<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Academy | Sign Up</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0b0f1a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:#111827;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(245,197,66,.4);
}

h1{
    color:#f5c542;
    text-align:center;
    margin-bottom:10px;
}

p{
    color:#cfcfcf;
    text-align:center;
    margin-bottom:30px;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    color:#ffffff;
    display:block;
    margin-bottom:8px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#1f2937;
    color:#ffffff;
    font-size:16px;
}

.input-box input:focus{
    outline:none;
    border:2px solid #f5c542;
}

button{
    width:100%;
    padding:15px;
    background:#f5c542;
    color:#111827;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ffb700;
}

#msg{
    text-align:center;
    margin-top:20px;
    color:#00ff99;
}

.footer{
    text-align:center;
    color:#999;
    margin-top:20px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Crypto Academy</h1>

<p>Join our community and receive crypto news & updates.</p>

<div class="input-box">
<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your full name" required>
</div>

<div class="input-box">
<label>Email Address</label>
<input type="email" id="email" placeholder="Enter your email address" required>
</div>

<button onclick="save()">Sign Up</button>

<div id="msg"></div>

<div class="footer">
© 2026 Crypto Academy
</div>

</div>

<script>

function save(){

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();

    if(name=="" || email==""){
        document.getElementById("msg").innerHTML="Please fill all fields.";
        document.getElementById("msg").style.color="red";
        return;
    }

    fetch("YOUR_GOOGLE_APPS_SCRIPT_URL",{

        method:"POST",

        body:new URLSearchParams({

            name:name,
            email:email

        })

    })

    .then(response=>response.text())

    .then(data=>{

        document.getElementById("msg").innerHTML="✅ Thank you for subscribing!";
        document.getElementById("msg").style.color="#00ff99";

        document.getElementById("name").value="";
        document.getElementById("email").value="";

    })

    .catch(error=>{

        document.getElementById("msg").innerHTML="❌ Error sending data.";
        document.getElementById("msg").style.color="red";

    });

}

</script>

</body>
</html>
