<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Academy Login</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#0b0f1a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    width:350px;
    background:#111827;
    padding:30px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 15px rgba(255,193,7,.4);
}

h2{
    color:#f5c542;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:5px;
    background:#1f2937;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#f5c542;
    color:black;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#ffb700;
}

</style>

</head>

<body>

<div class="container">

<h2>Crypto Academy</h2>

<form>

<input type="text" placeholder="Enter Your Name" required>

<input type="email" placeholder="Enter Your Email" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
